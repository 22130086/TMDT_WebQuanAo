spring.application.name=fashion-marketplace

# ===== DATASOURCE =====
spring.datasource.url=jdbc:mysql://localhost:3306/fashion_marketplace?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== JWT =====
app.jwt.secret=1234567890123456789012345678901234567890123456789012345678901234
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ===== SERVER =====
server.port=8080

# ===== CORS =====
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174
 
# ===== FILE UPLOAD =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
app.upload.dir=uploads

# ==========================================
# VNPAY SANDBOX CONFIGURATION
